name: Windows xCapture CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout xCapture
      uses: actions/checkout@v4
      with:
          submodules: 'true'
    - name: Setup msbuild
      uses: microsoft/setup-msbuild@v1

    - name: Download wxWidgets
      run:
        git clone --depth=1 --shallow-submodules --recurse-submodules -b xlights_2026.04 https://github.com/xLightsSequencer/wxWidgets ..\wxWidgets\

    - name: Build wxWidgets
      working-directory: ..\wxWidgets\
      run: msbuild /m .\build\msw\wx_vc17.sln /p:Configuration="Release" /p:Platform="x64"

    - name: Build xCapture
      working-directory: xCapture
      run: msbuild /m:10 xCapture.sln /p:Configuration="Release" -p:Platform="x64"

    - name: Upload xCapture Exe
      uses: actions/upload-artifact@v4
      with:
        name: xCapture_Exe
        path: 'xCapture\x64\Release\xCapture.exe'
